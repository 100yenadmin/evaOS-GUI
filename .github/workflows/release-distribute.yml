name: Distribute evaOS Beta Release Assets

# evaOS beta fork: manual-only distribution. This workflow must never mirror
# upstream AionUi assets or historical upstream tags.
#
# Distribution is GitHub Releases only. The workflow validates the existing
# draft release assets and RC canary proof, then publishes the same draft
# GitHub prerelease. No external bucket or CDN is used for this RC.

on:
  # Manual trigger for smoke testing or for retrying a missed release:
  # pick any existing release tag to re-run the distribution against.
  workflow_dispatch:
    inputs:
      beta_distribution_ack:
        description: 'Type evaos-beta to acknowledge this distribution workflow is manual-only on the evaOS beta fork.'
        required: true
        type: string
      tag:
        description: 'Existing evaOS beta release tag to distribute (must start with evaos-beta-)'
        required: true
        type: string
      rc_proof_run_id:
        description: 'Successful evaOS Beta RC Canary workflow run id for the same tag.'
        required: true
        type: string
      release_target_platforms:
        description: 'Release target platforms for verification: all keeps Windows/macOS/Linux; macos distributes only macOS assets.'
        required: false
        default: all
        type: choice
        options:
          - all
          - macos

env:
  EVAOS_RELEASE_TARGET_PLATFORMS: ${{ inputs.release_target_platforms || vars.EVAOS_RELEASE_TARGET_PLATFORMS || 'all' }}

concurrency:
  group: evaos-beta-distribute-${{ github.event.inputs.tag || github.run_id }}
  cancel-in-progress: false

jobs:
  distribute:
    name: Distribute release assets
    runs-on: ubuntu-latest
    if: github.event.inputs.beta_distribution_ack == 'evaos-beta' && vars.EVAOS_BETA_RELEASE_PUBLISH_ENABLED == 'true'
    permissions:
      contents: write # required to publish the validated GitHub prerelease after RC proof
      actions: read # required for gh run view/download of RC proof artifacts
    steps:
      - name: Extract version from tag
        id: version
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          TAG="${EVENT_TAG:-$INPUT_TAG}"
          if [ -z "$TAG" ]; then
            echo "::error::No tag provided (event did not supply one)."
            exit 1
          fi
          if [[ "$TAG" != evaos-beta-* ]]; then
            echo "::error::Refusing to distribute non-evaOS beta tag: $TAG"
            exit 1
          fi
          if [[ "$TAG" == *"-dev" || "$TAG" == *"-dev-"* || "$TAG" == *"-dev."* ]]; then
            echo "::error::Refusing to distribute development beta tag: $TAG"
            exit 1
          fi
          VERSION="${TAG#evaos-beta-}"
          VERSION="${VERSION#v}"
          if [[ "$VERSION" != *evaos-beta* ]]; then
            echo "::error::Refusing to distribute tag without evaos-beta version marker: $TAG"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG / Version: $VERSION"

      - name: Checkout release refs
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release branch provenance
        id: provenance
        env:
          TAG: ${{ steps.version.outputs.tag }}
          EVAOS_BETA_RELEASE_BRANCH: ${{ vars.EVAOS_BETA_RELEASE_BRANCH }}
        run: |
          set -euo pipefail
          if [ -z "${EVAOS_BETA_RELEASE_BRANCH:-}" ]; then
            echo "::error::EVAOS_BETA_RELEASE_BRANCH must be set before public beta distribution."
            exit 1
          fi

          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" "refs/heads/${EVAOS_BETA_RELEASE_BRANCH}:refs/remotes/origin/${EVAOS_BETA_RELEASE_BRANCH}"
          TAG_COMMIT=$(git rev-list -n 1 "$TAG")
          if ! git merge-base --is-ancestor "$TAG_COMMIT" "origin/${EVAOS_BETA_RELEASE_BRANCH}"; then
            echo "::error::Tag $TAG ($TAG_COMMIT) is not reachable from approved release branch ${EVAOS_BETA_RELEASE_BRANCH}."
            exit 1
          fi

          echo "tag_commit=$TAG_COMMIT" >> $GITHUB_OUTPUT
          echo "Validated $TAG at $TAG_COMMIT against ${EVAOS_BETA_RELEASE_BRANCH}."

      - name: Guard GitHub release is still draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          RELEASE_JSON=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft,isPrerelease,tagName,publishedAt)
          node - "$RELEASE_JSON" <<'NODE'
          const release = JSON.parse(process.argv[2]);
          if (!release.isDraft) {
            throw new Error(`Release ${release.tagName} is already published; refusing same-tag redistribution.`);
          }
          if (!release.isPrerelease) {
            throw new Error(`Release ${release.tagName} must remain marked as a prerelease.`);
          }
          NODE

      - name: Validate GitHub draft asset platform set
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          RELEASE_JSON=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets,tagName)
          node - "$RELEASE_JSON" "$EVAOS_RELEASE_TARGET_PLATFORMS" <<'NODE'
          const fs = require('fs');
          const release = JSON.parse(process.argv[2]);
          const target = process.argv[3];
          const assets = release.assets || [];
          if (assets.length === 0) {
            throw new Error(`Release ${release.tagName} has no draft assets to publish.`);
          }

          function normalizeAsset(asset) {
            return {
              name: asset.name || '',
              size: Number(asset.size || 0),
              digest: asset.digest || '',
              state: asset.state || '',
              contentType: asset.contentType || '',
            };
          }

          function writeSnapshot() {
            const snapshot = assets.map(normalizeAsset).sort((a, b) => a.name.localeCompare(b.name));
            fs.writeFileSync('draft-release-assets.snapshot.json', `${JSON.stringify(snapshot, null, 2)}\n`);
          }

          if (target === 'all') {
            const hasFamily = {
              macos: assets.some((asset) => (
                /\.(dmg|pkg)$/i.test(asset.name || '') ||
                /^latest(?:-arm64)?-mac\.ya?ml$/i.test(asset.name || '') ||
                /(^|[._ -])(mac|macos|darwin)([._ -]|$)/i.test(asset.name || '')
              )),
              windows: assets.some((asset) => (
                /\.(exe|msi|appx|appxbundle|msix|msixbundle|nupkg)$/i.test(asset.name || '') ||
                /^latest(?:-(?:win|windows)(?:-.+)?)?\.ya?ml$/i.test(asset.name || '') ||
                /(^|[._ -])(win|windows)([._ -]|$)/i.test(asset.name || '')
              )),
              linux: assets.some((asset) => (
                /\.(deb|rpm|appimage|snap|pacman)$/i.test(asset.name || '') ||
                /\.tar\.(gz|xz|bz2)$/i.test(asset.name || '') ||
                /^latest-linux(?:-.+)?\.ya?ml$/i.test(asset.name || '') ||
                /(^|[._ -])linux([._ -]|$)/i.test(asset.name || '')
              )),
            };
            const missing = Object.entries(hasFamily)
              .filter(([, present]) => !present)
              .map(([family]) => family);
            if (missing.length > 0) {
              throw new Error(`release_target_platforms=all is missing required platform families: ${missing.join(', ')}`);
            }
            writeSnapshot();
            console.log(`All-platform draft asset set accepted for ${release.tagName}.`);
            process.exit(0);
          }
          if (target !== 'macos') {
            throw new Error(`Unsupported EVAOS_RELEASE_TARGET_PLATFORMS: ${target}`);
          }

          const disallowed = [];
          for (const asset of assets) {
            const name = asset.name || '';
            const lower = name.toLowerCase();
            const reasons = [];
            if (/\.(exe|msi|appx|appxbundle|msix|msixbundle|nupkg)$/i.test(name)) {
              reasons.push('Windows installer/package');
            }
            if (/\.(deb|rpm|appimage|snap|pacman)$/i.test(name)) {
              reasons.push('Linux installer/package');
            }
            if (/\.tar\.(gz|xz|bz2)$/i.test(name)) {
              reasons.push('Linux/archive package');
            }
            if (/^latest(?:-(?:win|windows|linux)(?:-.+)?)?\.ya?ml$/i.test(name)) {
              reasons.push('non-macOS updater metadata');
            }
            if (/\.(exe|msi)\.blockmap$/i.test(name)) {
              reasons.push('Windows blockmap');
            }
            if (/(^|[._ -])(win|windows|linux)([._ -]|$)/i.test(name)) {
              reasons.push('non-macOS platform marker');
            }
            if (lower.includes('appimage')) {
              reasons.push('Linux AppImage marker');
            }
            if (reasons.length > 0) {
              disallowed.push(`${name} (${[...new Set(reasons)].join(', ')})`);
            }
          }

          if (disallowed.length > 0) {
            throw new Error(
              `macOS-only distribution cannot publish non-macOS draft assets for ${release.tagName}:\n` +
              disallowed.map((entry) => `- ${entry}`).join('\n')
            );
          }
          writeSnapshot();
          console.log(`macOS-only draft asset set accepted for ${release.tagName}: ${assets.map((asset) => asset.name).join(', ')}`);
          NODE

      - name: Download release assets from GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          case "${EVAOS_RELEASE_TARGET_PLATFORMS}" in
            all)
              patterns=(
                --pattern "*.dmg"
                --pattern "*.exe"
                --pattern "*.msi"
                --pattern "*.deb"
                --pattern "*.zip"
                --pattern "*.yml"
                --pattern "evaos-beta-release-manifest.json"
              )
              ;;
            macos)
              patterns=(
                --pattern "*.dmg"
                --pattern "*.zip"
                --pattern "latest-mac.yml"
                --pattern "latest-arm64-mac.yml"
                --pattern "evaos-beta-release-manifest.json"
              )
              ;;
            *)
              echo "::error::Unsupported EVAOS_RELEASE_TARGET_PLATFORMS: ${EVAOS_RELEASE_TARGET_PLATFORMS}"
              exit 1
              ;;
          esac
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist \
            "${patterns[@]}"
          echo "Downloaded files:"
          ls -la dist

      - name: Download trusted release manifest artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if [ ! -f dist/evaos-beta-release-manifest.json ]; then
            echo "::error::Release is missing evaOS beta release manifest."
            exit 1
          fi

          RELEASE_RUN_ID=$(node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('dist/evaos-beta-release-manifest.json','utf8')); process.stdout.write(String(m.releaseRunId || ''));")
          if [ -z "$RELEASE_RUN_ID" ]; then
            echo "::error::Release manifest is missing releaseRunId."
            exit 1
          fi

          mkdir -p trusted-manifest
          gh run download "$RELEASE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "evaos-beta-release-manifest-${TAG}" \
            --dir trusted-manifest
          TRUSTED_MANIFEST_PATH=$(find trusted-manifest -type f -name evaos-beta-release-manifest.json | head -n 1)
          if [ -z "$TRUSTED_MANIFEST_PATH" ]; then
            echo "::error::Trusted manifest artifact did not contain evaos-beta-release-manifest.json."
            exit 1
          fi
          if [ "$TRUSTED_MANIFEST_PATH" != "trusted-manifest/evaos-beta-release-manifest.json" ]; then
            cp "$TRUSTED_MANIFEST_PATH" trusted-manifest/evaos-beta-release-manifest.json
          fi

      - name: Validate evaOS beta asset identity
        run: |
          shopt -s nullglob
          files=(dist/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No release assets downloaded."
            exit 1
          fi

          for file in "${files[@]}"; do
            base="$(basename "$file")"
            if [ "$base" = "evaos-beta-release-manifest.json" ]; then
              continue
            fi
            if [[ "$base" == *.yml ]]; then
              continue
            fi
            case "$base" in
              *"AionUi"*|*"AionUI"*|*"Aion-UI"*|*"aion-ui"*|*"aionui"*)
                echo "::error::Refusing to distribute upstream AionUi asset: $base"
                exit 1
                ;;
            esac

            case "$base" in
              *"evaOS Workbench Beta"*|*"evaOS.Workbench.Beta"*|*"EvaOSWorkbenchBeta"*|*"evaos-workbench-beta"*)
                ;;
              *)
                echo "::error::Refusing to distribute asset without evaOS beta identity marker: $base"
                exit 1
                ;;
            esac
          done

      - name: Verify release updater metadata
        env:
          INCLUDE_WEB_CLI_ASSETS: '0'
          EVAOS_RELEASE_TARGET_PLATFORMS: ${{ env.EVAOS_RELEASE_TARGET_PLATFORMS }}
          MOCK_VERSION: ${{ steps.version.outputs.version }}
        run: bash scripts/verify-release-assets.sh dist

      - name: Validate release manifest and workflow provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPECTED_RELEASE_COMMIT: ${{ steps.provenance.outputs.tag_commit }}
          EVAOS_BETA_TRUSTED_MANIFEST_PATH: trusted-manifest/evaos-beta-release-manifest.json
          TAG: ${{ steps.version.outputs.tag }}
        run: node scripts/evaosBetaReleaseGate.js verify-manifest dist "$TAG"

      - name: Validate release candidate proof
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RC_PROOF_RUN_ID: ${{ github.event.inputs.rc_proof_run_id }}
          TAG: ${{ steps.version.outputs.tag }}
          EXPECTED_RELEASE_COMMIT: ${{ steps.provenance.outputs.tag_commit }}
        run: |
          set -euo pipefail
          if [ -z "$RC_PROOF_RUN_ID" ]; then
            echo "::error::rc_proof_run_id is required before public beta distribution."
            exit 1
          fi

          RUN_JSON=$(gh run view "$RC_PROOF_RUN_ID" --repo "$GITHUB_REPOSITORY" --json conclusion,event,workflowName)
          node - "$RUN_JSON" <<'NODE'
          const run = JSON.parse(process.argv[2]);
          if (run.conclusion !== 'success') {
            throw new Error(`RC proof run did not succeed: ${run.conclusion}`);
          }
          if (run.workflowName !== 'evaOS Beta RC Canary') {
            throw new Error(`RC proof run used unexpected workflow: ${run.workflowName}`);
          }
          if (run.event !== 'workflow_dispatch') {
            throw new Error(`RC proof run was not manually dispatched: ${run.event}`);
          }
          NODE

          rm -rf rc-proof-download rc-proof
          mkdir -p rc-proof-download
          gh run download "$RC_PROOF_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "evaos-beta-rc-proof-${TAG}" \
            --dir rc-proof-download
          PROOF_MANIFEST=$(find rc-proof-download -type f -name evaos-beta-rc-proof.json | head -n 1)
          if [ -z "$PROOF_MANIFEST" ]; then
            echo "::error::RC proof artifact did not contain evaos-beta-rc-proof.json."
            exit 1
          fi
          PROOF_ROOT=$(dirname "$PROOF_MANIFEST")
          mkdir -p rc-proof
          cp -R "$PROOF_ROOT"/. rc-proof/

          node scripts/evaosBetaReleaseGate.js verify-rc-proof rc-proof "$TAG"

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          RELEASE_JSON=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets,isDraft,isPrerelease,tagName,publishedAt)
          node - "$RELEASE_JSON" <<'NODE'
          const fs = require('fs');
          const release = JSON.parse(process.argv[2]);
          if (!release.isDraft) {
            throw new Error(`Release ${release.tagName} is already published; refusing same-tag redistribution.`);
          }
          if (!release.isPrerelease) {
            throw new Error(`Release ${release.tagName} must remain marked as a prerelease.`);
          }
          if (!fs.existsSync('draft-release-assets.snapshot.json')) {
            throw new Error('Missing draft-release-assets.snapshot.json from the asset validation step.');
          }

          const expected = JSON.parse(fs.readFileSync('draft-release-assets.snapshot.json', 'utf8'));
          const current = (release.assets || []).map((asset) => ({
            name: asset.name || '',
            size: Number(asset.size || 0),
            digest: asset.digest || '',
            state: asset.state || '',
            contentType: asset.contentType || '',
          })).sort((a, b) => a.name.localeCompare(b.name));

          if (JSON.stringify(current) !== JSON.stringify(expected)) {
            const expectedByName = new Map(expected.map((asset) => [asset.name, asset]));
            const currentByName = new Map(current.map((asset) => [asset.name, asset]));
            const missing = expected.filter((asset) => !currentByName.has(asset.name)).map((asset) => asset.name);
            const extra = current.filter((asset) => !expectedByName.has(asset.name)).map((asset) => asset.name);
            const changed = current
              .filter((asset) => expectedByName.has(asset.name) && JSON.stringify(asset) !== JSON.stringify(expectedByName.get(asset.name)))
              .map((asset) => asset.name);
            throw new Error(
              `Release ${release.tagName} draft assets changed after validation; refusing publish.\n` +
              `Missing: ${missing.join(', ') || 'none'}\n` +
              `Extra: ${extra.join(', ') || 'none'}\n` +
              `Changed metadata: ${changed.join(', ') || 'none'}`
            );
          }
          NODE

          gh release edit "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false \
            --prerelease=true \
            --latest=false \
            --verify-tag

          RELEASE_JSON=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft,isPrerelease,tagName,publishedAt)
          node - "$RELEASE_JSON" <<'NODE'
          const release = JSON.parse(process.argv[2]);
          if (release.isDraft) {
            throw new Error(`Release ${release.tagName} is still a draft after publish.`);
          }
          if (!release.isPrerelease) {
            throw new Error(`Release ${release.tagName} lost prerelease status.`);
          }
          if (!release.publishedAt) {
            throw new Error(`Release ${release.tagName} has no publishedAt timestamp.`);
          }
          NODE

      - name: Summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          {
            echo "### Release assets distributed"
            echo ""
            echo "- Tag: \`${TAG}\`"
            echo "- Version: \`${VERSION}\`"
            echo "- Channel: GitHub Releases prerelease"
            echo "- URL: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          } >> $GITHUB_STEP_SUMMARY
