name: Distribute evaOS Beta Release Assets

# evaOS beta fork: manual-only GitHub Release promotion. This workflow must
# never mirror upstream AionUi assets, historical upstream tags, or upload
# release artifacts to external object storage.

on:
  # Manual trigger for smoke testing or for retrying a missed release:
  # pick any existing release tag to re-run the distribution against.
  workflow_dispatch:
    inputs:
      beta_distribution_ack:
        description: 'Type evaos-beta to acknowledge this distribution workflow is manual-only on the evaOS beta fork.'
        required: true
        type: string
      tag:
        description: 'Existing evaOS beta release tag to distribute (must start with evaos-beta-)'
        required: true
        type: string
      rc_proof_run_id:
        description: 'Successful evaOS Beta RC Canary workflow run id for the same tag.'
        required: true
        type: string
      trusted_manifest_run_id:
        description: 'Optional workflow run id that uploaded the trusted release manifest artifact. Required for local-signed-dmg-fallback releases.'
        required: false
        type: string
      local_signed_dmg_fallback_ack:
        description: 'Type evaos-local-signed-dmg only when distributing locally finalized DMGs.'
        required: false
        default: ''
        type: string
      release_target_platforms:
        description: 'Release target platforms for verification: all keeps Windows/macOS/Linux; macos distributes only macOS assets.'
        required: false
        default: all
        type: choice
        options:
          - all
          - macos

permissions:
  contents: write
  actions: read

env:
  EVAOS_RELEASE_TARGET_PLATFORMS: ${{ inputs.release_target_platforms || vars.EVAOS_RELEASE_TARGET_PLATFORMS || 'all' }}

jobs:
  distribute:
    name: Distribute release assets
    runs-on: ubuntu-latest
    if: github.event.inputs.beta_distribution_ack == 'evaos-beta' && vars.EVAOS_BETA_RELEASE_PUBLISH_ENABLED == 'true'
    steps:
      - name: Extract version from tag
        id: version
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          TAG="${EVENT_TAG:-$INPUT_TAG}"
          if [ -z "$TAG" ]; then
            echo "::error::No tag provided (event did not supply one)."
            exit 1
          fi
          if [[ "$TAG" != evaos-beta-* ]]; then
            echo "::error::Refusing to distribute non-evaOS beta tag: $TAG"
            exit 1
          fi
          if [[ "$TAG" == *"-dev" || "$TAG" == *"-dev-"* || "$TAG" == *"-dev."* ]]; then
            echo "::error::Refusing to distribute development beta tag: $TAG"
            exit 1
          fi
          VERSION="${TAG#evaos-beta-}"
          VERSION="${VERSION#v}"
          if [[ "$VERSION" != *evaos-beta* ]]; then
            echo "::error::Refusing to distribute tag without evaos-beta version marker: $TAG"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG / Version: $VERSION"

      - name: Checkout release refs
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release branch provenance
        id: provenance
        env:
          TAG: ${{ steps.version.outputs.tag }}
          EVAOS_BETA_RELEASE_BRANCH: ${{ vars.EVAOS_BETA_RELEASE_BRANCH }}
        run: |
          set -euo pipefail
          if [ -z "${EVAOS_BETA_RELEASE_BRANCH:-}" ]; then
            echo "::error::EVAOS_BETA_RELEASE_BRANCH must be set before public beta distribution."
            exit 1
          fi

          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" "refs/heads/${EVAOS_BETA_RELEASE_BRANCH}:refs/remotes/origin/${EVAOS_BETA_RELEASE_BRANCH}"
          TAG_COMMIT=$(git rev-list -n 1 "$TAG")
          if ! git merge-base --is-ancestor "$TAG_COMMIT" "origin/${EVAOS_BETA_RELEASE_BRANCH}"; then
            echo "::error::Tag $TAG ($TAG_COMMIT) is not reachable from approved release branch ${EVAOS_BETA_RELEASE_BRANCH}."
            exit 1
          fi

          echo "tag_commit=$TAG_COMMIT" >> $GITHUB_OUTPUT
          echo "Validated $TAG at $TAG_COMMIT against ${EVAOS_BETA_RELEASE_BRANCH}."

      - name: Download release assets from GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          case "${EVAOS_RELEASE_TARGET_PLATFORMS}" in
            all)
              patterns=(
                --pattern "*.dmg"
                --pattern "*.exe"
                --pattern "*.msi"
                --pattern "*.deb"
                --pattern "*.zip"
                --pattern "*.yml"
                --pattern "evaos-beta-release-manifest.json"
              )
              ;;
            macos)
              patterns=(
                --pattern "*.dmg"
                --pattern "*.zip"
                --pattern "latest-mac.yml"
                --pattern "latest-arm64-mac.yml"
                --pattern "evaos-beta-release-manifest.json"
              )
              ;;
            *)
              echo "::error::Unsupported EVAOS_RELEASE_TARGET_PLATFORMS: ${EVAOS_RELEASE_TARGET_PLATFORMS}"
              exit 1
              ;;
          esac
          gh release download "${{ steps.version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --dir dist \
            "${patterns[@]}"
          echo "Downloaded files:"
          ls -la dist

      - name: Download trusted release manifest artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          TRUSTED_MANIFEST_RUN_ID: ${{ github.event.inputs.trusted_manifest_run_id }}
          LOCAL_SIGNED_DMG_FALLBACK_ACK: ${{ github.event.inputs.local_signed_dmg_fallback_ack }}
        run: |
          set -euo pipefail
          if [ ! -f dist/evaos-beta-release-manifest.json ]; then
            echo "::error::Release is missing evaOS beta release manifest."
            exit 1
          fi

          RELEASE_RUN_ID=$(node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('dist/evaos-beta-release-manifest.json','utf8')); process.stdout.write(String(m.releaseRunId || ''));")
          RELEASE_PROVENANCE_MODE=$(node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('dist/evaos-beta-release-manifest.json','utf8')); process.stdout.write(String(m.releaseProvenance?.mode || 'github-release-workflow'));")
          if [ -z "$RELEASE_RUN_ID" ]; then
            echo "::error::Release manifest is missing releaseRunId."
            exit 1
          fi
          DOWNLOAD_RUN_ID="$RELEASE_RUN_ID"
          if [ "$RELEASE_PROVENANCE_MODE" = "local-signed-dmg-fallback" ]; then
            if [ "$LOCAL_SIGNED_DMG_FALLBACK_ACK" != "evaos-local-signed-dmg" ]; then
              echo "::error::Local signed DMG fallback release requires local_signed_dmg_fallback_ack=evaos-local-signed-dmg."
              exit 1
            fi
            if [ -z "$TRUSTED_MANIFEST_RUN_ID" ]; then
              echo "::error::Local signed DMG fallback release requires trusted_manifest_run_id."
              exit 1
            fi
            DOWNLOAD_RUN_ID="$TRUSTED_MANIFEST_RUN_ID"
          fi

          mkdir -p trusted-manifest
          gh run download "$DOWNLOAD_RUN_ID" \
            --repo "${{ github.repository }}" \
            --name "evaos-beta-release-manifest-${TAG}" \
            --dir trusted-manifest
          TRUSTED_MANIFEST_PATH=$(find trusted-manifest -type f -name evaos-beta-release-manifest.json | head -n 1)
          if [ -z "$TRUSTED_MANIFEST_PATH" ]; then
            echo "::error::Trusted manifest artifact did not contain evaos-beta-release-manifest.json."
            exit 1
          fi
          if [ "$TRUSTED_MANIFEST_PATH" != "trusted-manifest/evaos-beta-release-manifest.json" ]; then
            cp "$TRUSTED_MANIFEST_PATH" trusted-manifest/evaos-beta-release-manifest.json
          fi

      - name: Validate evaOS beta asset identity
        run: |
          shopt -s nullglob
          files=(dist/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No release assets downloaded."
            exit 1
          fi

          for file in "${files[@]}"; do
            base="$(basename "$file")"
            if [ "$base" = "evaos-beta-release-manifest.json" ]; then
              continue
            fi
            if [[ "$base" == *.yml ]]; then
              continue
            fi
            case "$base" in
              *"AionUi"*|*"AionUI"*|*"Aion-UI"*|*"aion-ui"*|*"aionui"*)
                echo "::error::Refusing to distribute upstream AionUi asset: $base"
                exit 1
                ;;
            esac

            case "$base" in
              *"evaOS Workbench Beta"*|*"evaOS.Workbench.Beta"*|*"EvaOSWorkbenchBeta"*|*"evaos-workbench-beta"*)
                ;;
              *)
                echo "::error::Refusing to distribute asset without evaOS beta identity marker: $base"
                exit 1
                ;;
            esac
          done

      - name: Verify release updater metadata
        env:
          INCLUDE_WEB_CLI_ASSETS: '0'
          EVAOS_RELEASE_TARGET_PLATFORMS: ${{ env.EVAOS_RELEASE_TARGET_PLATFORMS }}
          MOCK_VERSION: ${{ steps.version.outputs.version }}
        run: bash scripts/verify-release-assets.sh dist

      - name: Validate release manifest and workflow provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPECTED_RELEASE_COMMIT: ${{ steps.provenance.outputs.tag_commit }}
          EVAOS_BETA_TRUSTED_MANIFEST_PATH: trusted-manifest/evaos-beta-release-manifest.json
          EVAOS_BETA_LOCAL_SIGNED_DMG_FALLBACK_ACK: ${{ github.event.inputs.local_signed_dmg_fallback_ack }}
        run: node scripts/evaosBetaReleaseGate.js verify-manifest dist "${{ steps.version.outputs.tag }}"

      - name: Validate release candidate proof
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RC_PROOF_RUN_ID: ${{ github.event.inputs.rc_proof_run_id }}
          TAG: ${{ steps.version.outputs.tag }}
          EXPECTED_RELEASE_COMMIT: ${{ steps.provenance.outputs.tag_commit }}
          EVAOS_BETA_LOCAL_SIGNED_DMG_FALLBACK_ACK: ${{ github.event.inputs.local_signed_dmg_fallback_ack }}
        run: |
          set -euo pipefail
          if [ -z "$RC_PROOF_RUN_ID" ]; then
            echo "::error::rc_proof_run_id is required before public beta distribution."
            exit 1
          fi

          RUN_JSON=$(gh run view "$RC_PROOF_RUN_ID" --repo "${{ github.repository }}" --json conclusion,event,workflowName)
          node - "$RUN_JSON" <<'NODE'
          const run = JSON.parse(process.argv[2]);
          if (run.conclusion !== 'success') {
            throw new Error(`RC proof run did not succeed: ${run.conclusion}`);
          }
          if (run.workflowName !== 'evaOS Beta RC Canary') {
            throw new Error(`RC proof run used unexpected workflow: ${run.workflowName}`);
          }
          if (run.event !== 'workflow_dispatch') {
            throw new Error(`RC proof run was not manually dispatched: ${run.event}`);
          }
          NODE

          rm -rf rc-proof-download rc-proof
          mkdir -p rc-proof-download
          gh run download "$RC_PROOF_RUN_ID" \
            --repo "${{ github.repository }}" \
            --name "evaos-beta-rc-proof-${TAG}" \
            --dir rc-proof-download
          PROOF_MANIFEST=$(find rc-proof-download -type f -name evaos-beta-rc-proof.json | head -n 1)
          if [ -z "$PROOF_MANIFEST" ]; then
            echo "::error::RC proof artifact did not contain evaos-beta-rc-proof.json."
            exit 1
          fi
          PROOF_ROOT=$(dirname "$PROOF_MANIFEST")
          mkdir -p rc-proof
          cp -R "$PROOF_ROOT"/. rc-proof/

          node scripts/evaosBetaReleaseGate.js verify-rc-proof rc-proof "$TAG"

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          gh release edit "$TAG" \
            --repo "${{ github.repository }}" \
            --draft=false \
            --prerelease

          RELEASE_JSON=$(gh release view "$TAG" --repo "${{ github.repository }}" --json isDraft,isPrerelease,url)
          node - "$RELEASE_JSON" <<'NODE'
          const release = JSON.parse(process.argv[2]);
          if (release.isDraft) {
            throw new Error(`Release is still draft: ${release.url}`);
          }
          if (!release.isPrerelease) {
            throw new Error(`Release is not marked prerelease: ${release.url}`);
          }
          console.log(`Published GitHub prerelease: ${release.url}`);
          NODE

      - name: Summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          {
            echo "### Release assets distributed"
            echo ""
            echo "- Tag: \`${TAG}\`"
            echo "- Version: \`${VERSION}\`"
            echo "- Destination: GitHub Release"
          } >> $GITHUB_STEP_SUMMARY
