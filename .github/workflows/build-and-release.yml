name: Build and Release

concurrency:
  group: build-and-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: read
  pull-requests: read
  actions: write

on:
  workflow_dispatch:
    inputs:
      beta_release_ack:
        description: 'Type evaos-beta to acknowledge this workflow is manual-only on the evaOS beta fork.'
        required: true
        type: string
      release_target_platforms:
        description: 'Release target platforms: all keeps Windows/macOS/Linux; macos builds only macOS and defers Windows/Linux.'
        required: false
        default: all
        type: choice
        options:
          - all
          - macos
      macos_dmg_finalization:
        description: 'macOS DMG finalization owner. local stages app-notarized DMGs for local Developer ID finalization; ci attempts full CI DMG signing/notarization.'
        required: false
        default: local
        type: choice
        options:
          - local
          - ci

env:
  BUN_INSTALL_REGISTRY: 'https://registry.npmjs.org/'
  EVAOS_RELEASE_TARGET_PLATFORMS: ${{ inputs.release_target_platforms || vars.EVAOS_RELEASE_TARGET_PLATFORMS || 'all' }}
  EVAOS_MACOS_DMG_FINALIZATION: ${{ inputs.macos_dmg_finalization || 'local' }}

jobs:
  # 独立 code-quality job,供桌面构建和 web-cli 打包共用,避免重复跑
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    if: github.event.inputs.beta_release_ack == 'evaos-beta'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run postinstall
        run: bun run postinstall || true

      - name: Audit evaOS beta release config
        run: node scripts/evaosBetaReleaseGate.js audit-config

      - name: Validate release target platform profile
        shell: bash
        run: |
          case "${EVAOS_RELEASE_TARGET_PLATFORMS}" in
            all|macos)
              echo "Release target platforms: ${EVAOS_RELEASE_TARGET_PLATFORMS}"
              ;;
            *)
              echo "::error::Unsupported EVAOS_RELEASE_TARGET_PLATFORMS: ${EVAOS_RELEASE_TARGET_PLATFORMS}"
              echo "::error::Supported values: all, macos"
              exit 1
              ;;
          esac
          case "${EVAOS_MACOS_DMG_FINALIZATION}" in
            local|ci)
              echo "macOS DMG finalization: ${EVAOS_MACOS_DMG_FINALIZATION}"
              ;;
            *)
              echo "::error::Unsupported macos_dmg_finalization: ${EVAOS_MACOS_DMG_FINALIZATION}"
              echo "::error::Supported values: local, ci"
              exit 1
              ;;
          esac

      - name: Run ESLint
        run: bun run lint

      - name: Check Prettier formatting
        run: bun run format:check

      - name: TypeScript type check
        run: bunx tsc --noEmit

      - name: Run unit tests
        run: bunx vitest run

  build-pipeline:
    name: Build Pipeline
    uses: ./.github/workflows/_build-reusable.yml
    needs: code-quality
    # evaOS beta fork: release builds are manual-only until issue #12 creates
    # an audited beta release feed. Do not trigger from branch or tag pushes.
    if: needs.code-quality.result == 'success' && github.event.inputs.beta_release_ack == 'evaos-beta'
    with:
      skip_code_quality: true
      macos_dmg_finalization: ${{ inputs.macos_dmg_finalization || 'local' }}
      matrix: >-
        ${{ (inputs.release_target_platforms || vars.EVAOS_RELEASE_TARGET_PLATFORMS || 'all') == 'macos' && '{"include":[{"platform":"macos-arm64","os":"macos-14","command":"node scripts/build-with-builder.js arm64 --mac --arm64","artifact-name":"macos-build-arm64","arch":"arm64"},{"platform":"macos-x64","os":"macos-14","command":"node scripts/build-with-builder.js x64 --mac --x64","artifact-name":"macos-build-x64","arch":"x64"}]}' || '{"include":[{"platform":"macos-arm64","os":"macos-14","command":"node scripts/build-with-builder.js arm64 --mac --arm64","artifact-name":"macos-build-arm64","arch":"arm64"},{"platform":"macos-x64","os":"macos-14","command":"node scripts/build-with-builder.js x64 --mac --x64","artifact-name":"macos-build-x64","arch":"x64"},{"platform":"windows-x64","os":"windows-2022","command":"node scripts/build-with-builder.js x64 --win --x64","artifact-name":"windows-build-x64","arch":"x64"},{"platform":"windows-arm64","os":"windows-11-arm","command":"node scripts/build-with-builder.js arm64 --win --arm64","artifact-name":"windows-build-arm64","arch":"arm64"},{"platform":"linux-x64","os":"ubuntu-latest","command":"node scripts/build-with-builder.js x64 --linux --x64","artifact-name":"linux-build-x64","arch":"x64"},{"platform":"linux-arm64","os":"ubuntu-24.04-arm","command":"node scripts/build-with-builder.js arm64 --linux --arm64","artifact-name":"linux-build-arm64","arch":"arm64"}]}' }}
    secrets: inherit

  pack-web-cli:
    name: Pack Web CLI
    uses: ./.github/workflows/pack-web-cli.yml
    needs: code-quality
    # evaOS beta fork: release builds are manual-only until issue #12 creates
    # an audited beta release feed. Do not trigger from branch or tag pushes.
    if: needs.code-quality.result == 'success' && github.event.inputs.beta_release_ack == 'evaos-beta' && (inputs.release_target_platforms || vars.EVAOS_RELEASE_TARGET_PLATFORMS || 'all') == 'all'
    with:
      ref: ''
      append_commit_hash: false
      skip_code_quality: true
    secrets: inherit

  # 自动重试 workflow（当构建失败时）
  auto-retry-workflow:
    name: Auto Retry on Build Failure
    runs-on: ubuntu-latest
    needs: build-pipeline
    # 关键：只在首次失败时触发，避免无限循环
    if: |
      failure() &&
      github.run_attempt == 1 &&
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Log retry information
        run: |
          echo "=========================================="
          echo "🔄 Auto retry triggered (first failure)"
          echo "=========================================="
          echo "Build failed on first attempt, preparing auto retry..."
          echo "Current attempt: ${{ github.run_attempt }}"
          echo "Wait strategy: 5 minutes cooldown before retry"
          echo "=========================================="

      - name: Wait before retry (5 min cooldown)
        run: |
          echo "⏳ Waiting 5 minutes before retry..."
          echo "Start: $(date)"
          sleep 300
          echo "End: $(date)"
          echo "Triggering retry..."

      - name: Trigger workflow rerun
        run: |
          echo "🔄 Triggering full workflow rerun (attempt 2)..."

          # Use re-run API (not rerun-failed-jobs, to avoid loops)
          response=$(curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -w "\n%{http_code}" \
            https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/rerun)

          http_code=$(echo "$response" | tail -n1)

          if [ "$http_code" = "201" ]; then
            echo ""
            echo "✅ Retry triggered successfully"
            echo "This will be attempt 2"
            echo "Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            echo ""
            echo "❌ Retry trigger failed, HTTP status: $http_code"
            echo "Response:"
            echo "$response" | head -n-1
            exit 1
          fi

  # evaOS beta fork: tag creation is disabled until issue #12 creates an
  # audited beta release process.
  create-tag:
    name: Create Tag from Branch
    runs-on: ubuntu-latest
    needs: [build-pipeline]
    if: vars.EVAOS_BETA_RELEASE_PUBLISH_ENABLED == 'true' && (inputs.macos_dmg_finalization || 'local') == 'ci'
    outputs:
      tag_name: ${{ steps.create_tag.outputs.tag_name }}
      is_dev: ${{ steps.create_tag.outputs.is_dev }}
      tag_commit: ${{ steps.create_tag.outputs.tag_commit }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # GH_TOKEN is a PAT with `repo` + `workflow` scopes — required because
          # tag pushes whose reachable history contains .github/workflows/
          # changes are rejected for the built-in GITHUB_TOKEN (lacks the
          # `workflow` scope, which GITHUB_TOKEN can never grant).
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Create and push tag
        id: create_tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          APPROVED_RELEASE_BRANCH="${EVAOS_BETA_RELEASE_BRANCH:-}"

          make_beta_tag() {
            local version="$1"
            local suffix="${2:-}"
            if [[ "$version" != *evaos-beta* ]]; then
              version="${version}-evaos-beta"
            fi
            echo "evaos-beta-v${version}${suffix}"
          }

          # 根据分支确定 tag 格式
          if [ "$BRANCH_NAME" = "dev" ] || [ "$BRANCH_NAME" = "evaos/dev" ]; then
            TAG_NAME="$(make_beta_tag "$VERSION" "-dev-${COMMIT_SHORT}")"
            IS_DEV="true"
            echo "🔧 Development release: $TAG_NAME"
          elif [ -n "$APPROVED_RELEASE_BRANCH" ] && [ "$BRANCH_NAME" = "$APPROVED_RELEASE_BRANCH" ]; then
            TAG_NAME="$(make_beta_tag "$VERSION")"
            IS_DEV="false"
            echo "🚀 Production release: $TAG_NAME"
          else
            echo "❌ Refusing to create beta release tag from unapproved branch: $BRANCH_NAME"
            echo "Set EVAOS_BETA_RELEASE_BRANCH to the audited issue #12 release branch before enabling production beta tags."
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "is_dev=$IS_DEV" >> $GITHUB_OUTPUT

          # 检查远程tag是否已存在
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG_NAME$"; then
            if [ "$IS_DEV" = "false" ]; then
              # Main 分支：需要递增版本并修改 package.json
              echo "⚠️ Tag $TAG_NAME already exists, auto-incrementing version..."

              if [[ $VERSION =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                MAJOR=${BASH_REMATCH[1]}
                MINOR=${BASH_REMATCH[2]}
                PATCH=${BASH_REMATCH[3]}
                NEW_PATCH=$((PATCH + 1))
                NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

                echo "📝 Updating package.json version to $NEW_VERSION"

                # 更新 package.json 版本号
                bun pm version $NEW_VERSION

                # 配置git用户信息
                git config user.name "github-actions[bot]"
                git config user.email "github-actions[bot]@users.noreply.github.com"

                # 提交版本更新
                git add package.json bun.lock
                git commit -m "chore: bump version to $NEW_VERSION"
                git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
                git push origin $BRANCH_NAME

                # 获取新的 commit ID
                COMMIT_SHORT=$(git rev-parse --short HEAD)
                TAG_NAME="$(make_beta_tag "$NEW_VERSION" "-${COMMIT_SHORT}")"

                echo "🚀 New tag with updated version: $TAG_NAME"
                echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
              else
                TAG_NAME="$(make_beta_tag "$VERSION" "-${COMMIT_SHORT}")"
                echo "⚠️ Fallback: creating tag with commit ID: $TAG_NAME"
                echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
              fi
            else
              # Dev 分支 tag 已存在则失败（不应该发生）
              echo "⚠️ Dev tag $TAG_NAME already exists, this shouldn't happen"
              exit 1
            fi
          fi

          # 配置git用户信息（如果前面没配置）
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 创建并推送tag
          echo "Creating tag: $TAG_NAME"
          git tag $TAG_NAME
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin $TAG_NAME
          TAG_COMMIT=$(git rev-list -n 1 "$TAG_NAME")
          echo "tag_commit=$TAG_COMMIT" >> $GITHUB_OUTPUT
          echo "Tag commit: $TAG_COMMIT"
          echo "✅ Successfully created and pushed tag: $TAG_NAME"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          EVAOS_BETA_RELEASE_BRANCH: ${{ vars.EVAOS_BETA_RELEASE_BRANCH }}

  # 发布到 GitHub Releases
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-pipeline, create-tag, pack-web-cli]
    # Tag 推送时 create-tag 会被跳过，所以需要检查两种情况（排除 -dev- tag 避免重复）
    if: |
      always() &&
      vars.EVAOS_BETA_RELEASE_PUBLISH_ENABLED == 'true' &&
      needs.build-pipeline.result == 'success' &&
      needs.create-tag.result == 'success' &&
      (inputs.macos_dmg_finalization || 'local') == 'ci' &&
      (
        needs.pack-web-cli.result == 'success' ||
        (inputs.release_target_platforms || vars.EVAOS_RELEASE_TARGET_PLATFORMS || 'all') == 'macos'
      )
    # dev 分支使用 dev-release 环境，正式 tag 使用 release 环境
    environment: ${{ needs.create-tag.outputs.is_dev == 'true' && 'dev-release' || 'release' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version for release
        id: version
        run: |
          # 判断触发来源：正式 tag 推送 or dev 分支
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # 正式 Tag 推送触发（-dev- tag 已被排除，不会到达这里）
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            IS_DEV="false"
            echo "🚀 Creating stable release from tag: $TAG_NAME"
          else
            # dev 分支触发，使用 create-tag job 的输出
            TAG_NAME="${{ needs.create-tag.outputs.tag_name }}"
            IS_DEV="${{ needs.create-tag.outputs.is_dev }}"
            echo "🔧 Creating development release: $TAG_NAME"
          fi

          VERSION="${TAG_NAME#evaos-beta-}"
          VERSION="${VERSION#v}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "is_dev=$IS_DEV" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: build-artifacts

      - name: Prepare release assets (normalize updater metadata)
        shell: bash
        env:
          INCLUDE_WEB_CLI_ASSETS: '0'
          EVAOS_RELEASE_TARGET_PLATFORMS: ${{ env.EVAOS_RELEASE_TARGET_PLATFORMS }}
        run: bash scripts/prepare-release-assets.sh build-artifacts release-assets

      - name: Verify release assets before manifest
        shell: bash
        env:
          INCLUDE_WEB_CLI_ASSETS: '0'
          EVAOS_RELEASE_TARGET_PLATFORMS: ${{ env.EVAOS_RELEASE_TARGET_PLATFORMS }}
          MOCK_VERSION: ${{ steps.version.outputs.version }}
        run: bash scripts/verify-release-assets.sh release-assets

      - name: Write evaOS beta release manifest
        shell: bash
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          EVAOS_BETA_RELEASE_COMMIT: ${{ needs.create-tag.outputs.tag_commit || github.sha }}
          EVAOS_BETA_RELEASE_BRANCH: ${{ vars.EVAOS_BETA_RELEASE_BRANCH }}
          EVAOS_BETA_RELEASE_PUBLISH_ENABLED: ${{ vars.EVAOS_BETA_RELEASE_PUBLISH_ENABLED }}
        run: node scripts/evaosBetaReleaseGate.js write-manifest release-assets "$TAG_NAME"

      - name: Upload trusted evaOS beta release manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: evaos-beta-release-manifest-${{ steps.version.outputs.tag_name }}
          path: release-assets/evaos-beta-release-manifest.json
          if-no-files-found: error
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.is_dev == 'true' && format('Development Build {0}', steps.version.outputs.tag_name) || steps.version.outputs.tag_name }}
          files: |
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.dmg
            release-assets/**/*.deb
            release-assets/**/*.zip
            release-assets/**/*.yml
            release-assets/evaos-beta-release-manifest.json
          generate_release_notes: true
          draft: true
          prerelease: ${{ steps.version.outputs.is_dev == 'true' || contains(steps.version.outputs.tag_name, 'beta') || contains(steps.version.outputs.tag_name, 'alpha') || contains(steps.version.outputs.tag_name, 'rc') }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  local-dmg-finalization-summary:
    name: Local DMG Finalization Handoff
    runs-on: ubuntu-latest
    needs: build-pipeline
    if: needs.build-pipeline.result == 'success' && (inputs.macos_dmg_finalization || 'local') == 'local'
    steps:
      - name: Summarize staged macOS artifacts
        run: |
          {
            echo "## macOS DMGs staged for local finalization"
            echo ""
            echo "Build artifacts were uploaded by the reusable build workflow."
            echo "Do not publish these staged DMGs directly."
            echo ""
            echo "Next required local steps:"
            echo "1. Download the exact macos-build-arm64 and macos-build-x64 artifacts from this run."
            echo "2. Sign each DMG with Developer ID."
            echo "3. Submit each signed DMG to Apple notarization."
            echo "4. Staple each DMG."
            echo "5. Validate each DMG with stapler and Gatekeeper primary-signature checks."
            echo "6. Regenerate latest-mac.yml and latest-arm64-mac.yml from the finalized DMGs."
            echo "7. Create/update the GitHub prerelease with the finalized DMGs and run the local signed DMG manifest registration workflow."
          } >> "$GITHUB_STEP_SUMMARY"
