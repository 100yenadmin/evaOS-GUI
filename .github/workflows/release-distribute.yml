name: Distribute evaOS Beta Release Assets

# evaOS beta fork: manual-only distribution. This workflow must never mirror
# upstream AionUi assets or historical upstream tags.
#
# All credentials / identifiers are read from repository secrets:
#   - AWS_REGION
#   - AWS_ROLE_ARN
#   - AWS_S3_BUCKET
# Do NOT hardcode these values in this file.

on:
  # Manual trigger for smoke testing or for retrying a missed release:
  # pick any existing release tag to re-run the distribution against.
  workflow_dispatch:
    inputs:
      beta_distribution_ack:
        description: 'Type evaos-beta to acknowledge this distribution workflow is manual-only on the evaOS beta fork.'
        required: true
        type: string
      tag:
        description: 'Existing evaOS beta release tag to distribute (must start with evaos-beta-)'
        required: true
        type: string

permissions:
  id-token: write # required for OIDC token
  contents: read

jobs:
  distribute:
    name: Distribute release assets
    runs-on: ubuntu-latest
    if: github.event.inputs.beta_distribution_ack == 'evaos-beta'
    steps:
      - name: Extract version from tag
        id: version
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          TAG="${EVENT_TAG:-$INPUT_TAG}"
          if [ -z "$TAG" ]; then
            echo "::error::No tag provided (event did not supply one)."
            exit 1
          fi
          if [[ "$TAG" != evaos-beta-* ]]; then
            echo "::error::Refusing to distribute non-evaOS beta tag: $TAG"
            exit 1
          fi
          VERSION="${TAG#evaos-beta-}"
          VERSION="${VERSION#v}"
          if [[ "$VERSION" != *evaos-beta* ]]; then
            echo "::error::Refusing to distribute tag without evaos-beta version marker: $TAG"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG / Version: $VERSION"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Guard against same-version overwrite
        env:
          S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          DEST="s3://${S3_BUCKET}/releases/${VERSION}/"
          COUNT=$(aws s3 ls "$DEST" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$COUNT" -gt 0 ]; then
            echo "::error::Version directory already contains $COUNT file(s). Refusing to overwrite."
            echo "::error::Same-version re-publish is not allowed (downstream caches would serve stale files). Release a new version instead."
            aws s3 ls "$DEST"
            exit 1
          fi

      - name: Download release assets from GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ steps.version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --dir dist \
            --pattern "*.dmg" \
            --pattern "*.exe" \
            --pattern "*.msi" \
            --pattern "*.deb" \
            --pattern "*.zip"
          echo "Downloaded files:"
          ls -la dist

      - name: Validate evaOS beta asset identity
        run: |
          shopt -s nullglob
          files=(dist/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No release assets downloaded."
            exit 1
          fi

          for file in "${files[@]}"; do
            base="$(basename "$file")"
            case "$base" in
              *"AionUi"*|*"AionUI"*|*"Aion-UI"*|*"aion-ui"*|*"aionui"*)
                echo "::error::Refusing to distribute upstream AionUi asset: $base"
                exit 1
                ;;
            esac

            case "$base" in
              *"evaOS Workbench Beta"*|*"EvaOSWorkbenchBeta"*|*"evaos-workbench-beta"*)
                ;;
              *)
                echo "::error::Refusing to distribute asset without evaOS beta identity marker: $base"
                exit 1
                ;;
            esac
          done

      - name: Upload assets
        env:
          S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          aws s3 cp dist/ "s3://${S3_BUCKET}/releases/${VERSION}/" --recursive
          echo "Uploaded release ${VERSION}"

      - name: Summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          {
            echo "### Release assets distributed"
            echo ""
            echo "- Tag: \`${TAG}\`"
            echo "- Version: \`${VERSION}\`"
          } >> $GITHUB_STEP_SUMMARY
