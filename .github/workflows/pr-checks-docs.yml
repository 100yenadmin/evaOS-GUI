name: 'PR Checks (docs only)'

on:
  pull_request:
    types: [opened, synchronize, edited, ready_for_review]
    branches: [main, dev, evaos/dev, 'evaos/**']
    paths:
      - '**/*.md'
      - 'docs/**'
      - '.vscode/**'
      - '.github/ISSUE_TEMPLATE/**'

permissions:
  contents: read

jobs:
  code-quality:
    name: Code Quality
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run postinstall
        run: npm run postinstall || true

      - name: Install prek
        run: npm install -g @j178/prek

      - name: Run prek checks
        run: prek run --from-ref origin/${{ github.base_ref }} --to-ref HEAD

  unit-tests-docs-placeholder:
    name: Unit Tests (docs-only placeholder)
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only PR, skipping unit tests. This is not Ubuntu compatibility proof."

  coverage-test:
    name: Coverage Test
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only PR, skipping coverage tests."

  i18n-check:
    name: I18n Check
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only PR, skipping i18n checks."

  release-script-test:
    name: Release Script Test
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only PR, skipping release script tests."

  unit-tests-macos-placeholder:
    name: Unit Tests (macos-14)
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only PR, satisfying the macOS-first unit-test gate without running runtime tests."

  unit-tests-cross-platform-deferred:
    name: Cross-platform checks deferred
    runs-on: ubuntu-latest
    steps:
      - run: echo "Windows/Linux checks are deferred until post-1.0 unless explicitly requested."
