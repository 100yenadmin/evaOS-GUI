name: 'PR Checks'

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to run checks on'
        required: true
        type: string
      skip_build_test:
        description: 'Skip the build test job (saves ~45 min)'
        type: boolean
        required: false
        default: false
      run_windows_checks:
        description: 'Force Windows unit/build checks for this PR'
        type: boolean
        required: false
        default: false
  pull_request:
    types: [opened, synchronize, edited, closed, ready_for_review]
    branches: [main, dev, evaos/dev, 'evaos/**']
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.vscode/**'
      - '.github/ISSUE_TEMPLATE/**'

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: read
  checks: write
  id-token: write

env:
  BUN_INSTALL_REGISTRY: 'https://registry.npmjs.org/'

jobs:
  # Cancel in-progress runs when PR is closed (merged or manually closed)
  cancel-if-closed:
    name: Cancel if PR closed
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - run: echo "PR closed, cancelling in-progress runs via concurrency."

  pr-check-plan:
    name: PR Check Plan
    if: github.event_name == 'workflow_dispatch' || (github.event.action != 'closed' && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_windows_checks: ${{ steps.plan.outputs.run_windows_checks }}
      windows_reasons_json: ${{ steps.plan.outputs.windows_reasons_json }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve PR context
        uses: ./.github/actions/checkout-pr
        with:
          pr_number: ${{ inputs.pr_number }}
          github_token: ${{ github.token }}

      - name: List changed files
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_DISPATCH_PR_NUMBER: ${{ inputs.pr_number }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PR_NUMBER="$WORKFLOW_DISPATCH_PR_NUMBER"
          else
            PR_NUMBER="$PULL_REQUEST_NUMBER"
          fi

          gh api --paginate "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" --jq '.[].filename' | tee changed-files.txt

      - name: Plan macOS-first PR checks
        id: plan
        shell: bash
        env:
          RUN_WINDOWS_CHECKS: ${{ inputs.run_windows_checks }}
        run: |
          node scripts/evaosPrCheckPlan.js github-output < changed-files.txt | tee pr-check-plan.out
          cat pr-check-plan.out >> "$GITHUB_OUTPUT"

      - name: Publish check plan summary
        shell: bash
        run: |
          {
            echo "## PR check plan"
            echo "Windows checks: ${{ steps.plan.outputs.run_windows_checks }}"
            echo "Reasons: ${{ steps.plan.outputs.windows_reasons_json }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # Job 1: Code quality checks (TypeScript, Oxlint, Oxfmt)
  code-quality:
    name: Code Quality
    if: github.event_name == 'workflow_dispatch' || (github.event.action != 'closed' && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR context
        uses: ./.github/actions/checkout-pr
        with:
          pr_number: ${{ inputs.pr_number }}
          github_token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run postinstall
        run: npm run postinstall || true

      - name: Install prek
        run: npm install -g @j178/prek

      - name: Run prek checks
        run: prek run --from-ref origin/${{ env.PR_BASE_REF }} --to-ref HEAD

  # Job 2: Unit tests for the macOS-first beta lane.
  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    if: github.event_name == 'workflow_dispatch' || (github.event.action != 'closed' && github.event.pull_request.draft == false)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve PR context
        uses: ./.github/actions/checkout-pr
        with:
          pr_number: ${{ inputs.pr_number }}
          github_token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run postinstall
        run: npm run postinstall || true

      - name: Run extension system tests
        run: bunx vitest run

  windows-unit-tests:
    name: Unit Tests (windows-2022)
    needs: pr-check-plan
    if: needs.pr-check-plan.outputs.run_windows_checks == 'true'
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve PR context
        uses: ./.github/actions/checkout-pr
        with:
          pr_number: ${{ inputs.pr_number }}
          github_token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Disable Windows Defender
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run postinstall
        run: npm run postinstall || true

      - name: Run extension system tests
        run: bunx vitest run

  # Job 3: Coverage test (coverage still uses a lightweight runner; it is not
  # treated as Ubuntu compatibility proof for the macOS-first RC lane).
  coverage-tests:
    name: Coverage Test
    if: github.event_name == 'workflow_dispatch' || (github.event.action != 'closed' && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve PR context
        uses: ./.github/actions/checkout-pr
        with:
          pr_number: ${{ inputs.pr_number }}
          github_token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run postinstall
        run: npm run postinstall || true

      - name: Run coverage tests
        id: coverage
        continue-on-error: true
        run: bun run test:coverage

      - name: Upload coverage to Codecov (Linux coverage only)
        if: always() && hashFiles('coverage/lcov.info') != '' && github.repository == 'iOfficeAI/AionUi'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          use_oidc: ${{ secrets.CODECOV_TOKEN == '' }}
          files: coverage/lcov.info
          fail_ci_if_error: false
          verbose: true
      - name: Skip Codecov upload when preconditions are not met
        if: always() && hashFiles('coverage/lcov.info') != '' && github.repository != 'iOfficeAI/AionUi'
        shell: bash
        run: |
          echo 'Skipping Codecov upload due to unmet preconditions.'
          echo "Repository: ${{ github.repository }}"
      - name: Coverage result summary
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.coverage.outcome }}" = "failure" ]; then
            echo "::warning::Coverage tests failed (non-blocking). Check logs for failed test details."
            echo "## Coverage check (non-blocking warning)" >> $GITHUB_STEP_SUMMARY
            echo "Coverage command failed in this run. Please review test failures in logs." >> $GITHUB_STEP_SUMMARY
            if [ -f coverage/lcov.info ]; then
              echo "lcov.info exists, Codecov upload can still run." >> $GITHUB_STEP_SUMMARY
            else
              echo "lcov.info not found, Codecov upload was skipped." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "## Coverage check" >> $GITHUB_STEP_SUMMARY
            echo "Coverage command passed." >> $GITHUB_STEP_SUMMARY
            if [ -f coverage/lcov.info ]; then
              echo "Uploaded Linux (ubuntu-latest) coverage to Codecov." >> $GITHUB_STEP_SUMMARY
            else
              echo "Coverage passed but lcov.info is missing; Codecov upload was skipped." >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Upload coverage artifacts
        if: always() && hashFiles('coverage/lcov.info') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn

  i18n-check:
    name: I18n Check
    if: github.event_name == 'workflow_dispatch' || (github.event.action != 'closed' && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve PR context
        uses: ./.github/actions/checkout-pr
        with:
          pr_number: ${{ inputs.pr_number }}
          github_token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run postinstall
        run: npm run postinstall || true

      - name: Run i18n validation (warning-only)
        id: i18n
        shell: bash
        run: |
          set -o pipefail
          node scripts/check-i18n.js 2>&1 | tee i18n-check.log

      - name: Publish i18n summary
        if: always()
        shell: bash
        run: |
          echo "## i18n validation" >> $GITHUB_STEP_SUMMARY
          if grep -q "⚠️" i18n-check.log; then
            echo "Missing/incomplete translations found. Please review warnings below." >> $GITHUB_STEP_SUMMARY
          else
            echo "No i18n warnings detected." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>i18n log</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat i18n-check.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

  # Job 4: Build test for the macOS-first beta lane. Linux/Windows builds are
  # deferred to manual/release/scheduled workflows until after controlled 1.0.
  build-test:
    name: Build Test (${{ matrix.platform }})
    if: github.event.action != 'closed' && github.event.pull_request.draft == false && inputs.skip_build_test != true
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-arm64'
            os: 'macos-14'
            arch: 'arm64'
            target: '--mac'
            build_args: '--mac --arm64'
            unpacked_dir: 'mac-arm64'
          - platform: 'macos-x64'
            os: 'macos-14'
            arch: 'x64'
            target: '--mac'
            build_args: '--mac --x64'
            unpacked_dir: 'mac'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve PR context
        uses: ./.github/actions/checkout-pr
        with:
          pr_number: ${{ inputs.pr_number }}
          github_token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run postinstall
        run: npm run postinstall || true

      - name: Get Electron version
        id: electron-version
        shell: bash
        run: |
          ELECTRON_VERSION=$(node -p "require('./package.json').devDependencies.electron.replace(/[\^~]/g, '')")
          echo "version=$ELECTRON_VERSION" >> $GITHUB_OUTPUT
          echo "Electron version: $ELECTRON_VERSION"

      # Restore Electron/Electron-Builder caches before install-app-deps
      - name: Cache Electron artifacts
        id: electron-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/.cache/electron
            ${{ runner.temp }}/.cache/electron-builder
            ~/.cache/electron
            ~/.cache/electron-builder
            ${{ env.LOCALAPPDATA }}\electron-builder\Cache
          key: electron-cache-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('package.json', 'bun.lock') }}
          restore-keys: |
            electron-cache-${{ matrix.platform }}-${{ matrix.arch }}-
            electron-cache-${{ matrix.platform }}-

      - name: Cache status
        run: echo "electron-cache-hit=${{ steps.electron-cache.outputs.cache-hit }}"

      - name: Rebuild native modules for Electron (non-Windows)
        if: "!startsWith(matrix.platform, 'windows')"
        run: bunx electron-builder install-app-deps
        env:
          npm_config_runtime: electron
          npm_config_disturl: https://electronjs.org/headers
          ELECTRON_CACHE: ${{ runner.temp }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/.cache/electron-builder

      - name: Build test (non-Windows)
        shell: bash
        run: |
          echo "=========================================="
          echo "BUILD TEST: ${{ matrix.platform }}"
          echo "=========================================="
          node scripts/build-with-builder.js auto ${{ matrix.build_args }}
          echo "✓Build test passed for ${{ matrix.platform }}"
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
          npm_config_runtime: electron
          npm_config_target: ${{ steps.electron-version.outputs.version }}
          npm_config_disturl: https://electronjs.org/headers
          CI: true
          GH_TOKEN: ${{ github.token }}

      - name: Verify build artifacts exist
        shell: bash
        run: |
          echo "=========================================="
          echo "VERIFY ARTIFACTS: ${{ matrix.platform }}"
          echo "=========================================="
          ls -lah out || true

          case "${{ matrix.platform }}" in
            macos-*)
              ls out/*.dmg >/dev/null
              if ! ls out/*.zip >/dev/null 2>&1; then
                echo "::notice::macOS PR build smoke did not produce a ZIP; release asset verification enforces ZIP output for release profiles."
              fi
              ;;
          esac

      - name: Install smoke test (macOS arm64)
        if: matrix.platform == 'macos-arm64'
        shell: bash
        run: |
          set -euo pipefail
          echo "=========================================="
          echo "SMOKE INSTALL: macos-arm64"
          echo "=========================================="

          DMG_FILE=$(ls out/*.dmg | head -n 1)
          MOUNT_POINT="/tmp/aionui-smoke-mount"
          APP_DIR="/tmp/aionui-smoke-app"

          rm -rf "$MOUNT_POINT" "$APP_DIR"
          mkdir -p "$MOUNT_POINT" "$APP_DIR"

          hdiutil attach "$DMG_FILE" -nobrowse -mountpoint "$MOUNT_POINT"
          cp -R "$MOUNT_POINT"/*.app "$APP_DIR"/
          hdiutil detach "$MOUNT_POINT"

          APP_PATH=$(ls -d "$APP_DIR"/*.app | head -n 1)
          APP_BIN_NAME=$(/usr/libexec/PlistBuddy -c 'Print CFBundleExecutable' "$APP_PATH/Contents/Info.plist")
          APP_BIN="$APP_PATH/Contents/MacOS/$APP_BIN_NAME"

          test -x "$APP_BIN"
          "$APP_BIN" --version || true

      - name: Skip executable smoke for macOS x64 cross build
        if: matrix.platform == 'macos-x64'
        shell: bash
        run: |
          echo "Skipping runtime launch smoke for macos-x64 cross build on arm64 runner."
          ls -lah out/*.dmg
          ls -lah out/*.zip 2>/dev/null || echo "::notice::No macOS ZIP in PR smoke output; release profile verification covers release ZIP assets."

  windows-build-test:
    name: Build Test (${{ matrix.platform }})
    needs: pr-check-plan
    if: needs.pr-check-plan.outputs.run_windows_checks == 'true' && inputs.skip_build_test != true
    runs-on: windows-2022
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-x64'
            arch: 'x64'
            build_mode: 'x64'
            build_args: '--win --x64'
          - platform: 'windows-arm64'
            arch: 'arm64'
            build_mode: 'arm64'
            build_args: '--win --arm64'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve PR context
        uses: ./.github/actions/checkout-pr
        with:
          pr_number: ${{ inputs.pr_number }}
          github_token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run postinstall
        run: npm run postinstall || true

      - name: Cache Electron artifacts
        id: electron-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/.cache/electron
            ${{ runner.temp }}/.cache/electron-builder
            ${{ env.LOCALAPPDATA }}\electron-builder\Cache
          key: electron-cache-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('package.json', 'bun.lock') }}
          restore-keys: |
            electron-cache-${{ matrix.platform }}-${{ matrix.arch }}-
            electron-cache-${{ matrix.platform }}-

      - name: Cache status
        shell: pwsh
        run: Write-Host "electron-cache-hit=${{ steps.electron-cache.outputs.cache-hit }}"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17.0'

      - name: Build test
        shell: pwsh
        run: |
          Write-Host "=========================================="
          Write-Host "BUILD TEST: ${{ matrix.platform }}"
          Write-Host "=========================================="
          node scripts/build-with-builder.js ${{ matrix.build_mode }} ${{ matrix.build_args }}
          Write-Host "✓Build test passed for ${{ matrix.platform }}"
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          MSVS_VERSION: 2022
          GYP_MSVS_VERSION: 2022
          WindowsTargetPlatformVersion: 10.0.19041.0
          CI: true
          GH_TOKEN: ${{ github.token }}

      - name: Verify build artifacts exist
        shell: pwsh
        run: |
          Write-Host "=========================================="
          Write-Host "VERIFY ARTIFACTS: ${{ matrix.platform }}"
          Write-Host "=========================================="
          Get-ChildItem -Path out | Format-Table Name, Length, LastWriteTime
          $installer = Get-ChildItem -Path out -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "No Windows installer found in out/"
          }

      - name: Silent install smoke test (Windows x64)
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        run: |
          Write-Host "=========================================="
          Write-Host "SMOKE INSTALL: windows-x64"
          Write-Host "=========================================="

          $installer = Get-ChildItem -Path out -Filter "evaOS Workbench Beta-*-win-*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "No Windows installer found in out/"
          }

          Write-Host "Using installer: $($installer.FullName)"
          $installerProcess = Start-Process -FilePath $installer.FullName -ArgumentList '/S' -PassThru -NoNewWindow
          if (-not $installerProcess.WaitForExit(180000)) {
            Write-Host "Installer did not exit within 180 seconds. Recent installer-related processes:"
            Get-Process -ErrorAction SilentlyContinue |
              Where-Object { $_.ProcessName -match 'EvaOSWorkbenchBeta|AionUi|electron|nsis' } |
              Select-Object Id, ProcessName, StartTime, Path |
              Format-Table -AutoSize
            Stop-Process -Id $installerProcess.Id -Force -ErrorAction SilentlyContinue
            throw "Silent installer did not exit within 180 seconds"
          }

          if ($installerProcess.ExitCode -ne 0) {
            throw "Silent installer exited with code $($installerProcess.ExitCode)"
          }

          $candidates = @(
            "$env:LOCALAPPDATA\\Programs\\evaOS Workbench Beta\\EvaOSWorkbenchBeta.exe",
            "$env:ProgramFiles\\evaOS Workbench Beta\\EvaOSWorkbenchBeta.exe",
            "${env:ProgramFiles(x86)}\\evaOS Workbench Beta\\EvaOSWorkbenchBeta.exe"
          )

          $installedExe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $installedExe) {
            $searchRoots = @(
              "$env:LOCALAPPDATA\\Programs",
              "$env:ProgramFiles",
              "${env:ProgramFiles(x86)}"
            ) | Where-Object { $_ -and (Test-Path $_) }

            Write-Host "Expected paths were not present. Checking immediate install-root directories..."
            $candidateDirs = Get-ChildItem -Path $searchRoots -Directory -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match 'eva|EvaOS|AionUi|Workbench' } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 20

            foreach ($dir in $candidateDirs) {
              $candidateExe = Join-Path $dir.FullName "EvaOSWorkbenchBeta.exe"
              if (Test-Path $candidateExe) {
                $installedExe = $candidateExe
                break
              }
            }
          }

          if (-not $installedExe) {
            Write-Host "Recent immediate entries under standard install roots:"
            Get-ChildItem -Path $searchRoots -Directory -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 20 Name, FullName, LastWriteTime |
              Format-Table -AutoSize
            throw "Silent install finished but app executable not found in expected locations or standard install roots"
          }

          Write-Host "Installed executable: $installedExe"

      - name: Skip executable smoke for Windows arm64 cross build
        if: matrix.platform == 'windows-arm64'
        shell: pwsh
        run: |
          Write-Host "Skipping runtime install smoke for windows-arm64: runner is windows-x64, cannot reliably execute arm64 installer."
          Get-ChildItem -Path out -Filter "evaOS Workbench Beta-*-win-*.exe" | Format-Table Name, Length

  # Job 5: Test release scripts (fast, no build required)
  release-script-test:
    name: Release Script Test
    if: github.event.action != 'closed' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Audit evaOS beta release config
        run: node scripts/evaosBetaReleaseGate.js audit-config

      - name: Create mock build artifacts
        shell: bash
        run: bash scripts/create-mock-release-artifacts.sh build-artifacts

      - name: Run prepare-release-assets script
        shell: bash
        env:
          MOCK_VERSION: '1.0.0'
          INCLUDE_WEB_CLI_ASSETS: '0'
        run: bash scripts/prepare-release-assets.sh build-artifacts release-assets

      - name: Write and verify evaOS beta release manifest
        shell: bash
        env:
          GITHUB_REPOSITORY: 100yenadmin/evaOS-GUI
          GITHUB_WORKFLOW: Build and Release
          EVAOS_BETA_RELEASE_WORKFLOW: Build and Release
          GITHUB_RUN_ID: '12345'
          GITHUB_RUN_ATTEMPT: '1'
          EVAOS_BETA_RELEASE_COMMIT: mock-sha
          EVAOS_BETA_RELEASE_BRANCH: evaos/release-public-beta
          EVAOS_BETA_RELEASE_PUBLISH_ENABLED: 'true'
          EXPECTED_RELEASE_COMMIT: mock-sha
          EVAOS_BETA_SKIP_GITHUB_RUN_VERIFY: '1'
        run: |
